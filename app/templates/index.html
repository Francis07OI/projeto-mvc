<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem vindo ao sistema</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f7f6f3;
            color: #111;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .label {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #999;
        }

        h1 {
            font-size: clamp(40px, 8vw, 64px);
            font-weight: 500;
            letter-spacing: -0.03em;
            line-height: 1;
            color: #111;
        }

        p {
            font-size: 16px;
            color: #888;
            font-weight: 300;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 0.5rem;
        }

        a {
            padding: 11px 28px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: opacity 0.15s;
        }

        a:hover { opacity: 0.8; }

        .btn-primary {
            background: #111;
            color: #f7f6f3;
        }

        .btn-secondary {
            background: transparent;
            color: #111;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="label">Bem-vindo ao</span>
        <h1>Sistema MVC</h1>
        <p>Faça login para acessar o sistema</p>
        <div class="actions">
            <a href="/auth/login" class="btn-primary">Entrar</a>
            <a href="/auth/cadastro" class="btn-secondary">Criar conta</a>
        </div>
    </div>
</body>
</html>
